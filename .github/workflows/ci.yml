name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Run go vet
        run: go vet ./...

      - name: Unit tests
        run: make test-unit

      - name: Race detector tests
        run: go test ./pkg/... -race -count=1

      - name: Build
        run: make build

      - name: E2E tests
        run: make test-e2e
